server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://app:4567;

        # Preserve host info
        proxy_set_header Host $host;

        # Forward real client IP (important for logs / rate limiting upstream if needed)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Forward protocol info
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional: increase robustness for upstream apps
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # Bonus: identify traffic came through nginx
        add_header X-Proxy "crawlbase-nginx" always;
    }

    # Optional: simple health check at edge
    location /nginx-health {
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}


