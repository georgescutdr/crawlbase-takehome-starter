services:
  app:
    build: .
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    expose:
      - "4567"

  redis:
    image: redis:7-alpine

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro